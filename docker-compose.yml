# docker-compose.yml — single-service ArcLibrary deployment.
#
# Quick start:
#   1. Copy `.env.example` to `.env` and fill in the values you need
#      (at minimum `OPENAI_API_KEY` and `NEXT_PUBLIC_SITE_URL`).
#   2. `docker compose up -d --build`
#   3. Hit http://localhost:3000
#
# Behind a reverse proxy (Caddy / Nginx / Traefik) terminate TLS and
# forward `X-Forwarded-For` so the rate limiter sees real client IPs.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # `NEXT_PUBLIC_*` vars need to be present at *build time* because
        # they are baked into the client bundle. Pull them from the same
        # `.env` file used at runtime.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_TWITTER_HANDLE: ${NEXT_PUBLIC_TWITTER_HANDLE:-}
        NEXT_PUBLIC_RYBBIT_SITE_ID: ${NEXT_PUBLIC_RYBBIT_SITE_ID:-}
        NEXT_PUBLIC_RYBBIT_SCRIPT_URL: ${NEXT_PUBLIC_RYBBIT_SCRIPT_URL:-}
    image: arclibrary:latest
    container_name: arclibrary
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:3000/api/chat >/dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
